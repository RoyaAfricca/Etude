<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étude - Collecte Globale des Éleves</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0F172A;
            --surface: #1E293B;
            --primary: #38BDF8;
            --accent: #F59E0B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --success: #10B981;
            --danger: #EF4444;
            --border: rgba(148, 163, 184, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .brand span {
            color: var(--primary);
        }

        .stats {
            display: flex;
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.2rem;
        }

        .stat-card p {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.8rem 1.2rem;
            border-radius: 0.8rem;
            color: var(--text-primary);
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-export {
            background: var(--success);
        }

        /* Table */
        .card {
            background: var(--surface);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(148, 163, 184, 0.05);
            text-align: left;
            padding: 1rem 1.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        td {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .badge {
            padding: 0.3rem 0.6rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
        }

        #loading {
            padding: 3rem;
            text-align: center;
            color: var(--text-secondary);
        }

        .error {
            color: var(--danger);
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 0.8rem;
            margin-bottom: 1rem;
            display: none;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>ÉTUDE<span>COLLECTE</span></h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Outil d'administration - Centralisation des éleves</p>
        </div>
        <div class="stats">
            <div class="stat-card">
                <h3 id="total-students">0</h3>
                <p>Éleves Total</p>
            </div>
            <div class="stat-card">
                <h3 id="total-centers">0</h3>
                <p>Centres Actifs</p>
            </div>
        </div>
    </header>

    <div id="error-msg" class="error"></div>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Rechercher un éleve, un niveau, un téléphone..." onkeyup="filterTable()">
        </div>
        <button class="btn btn-export" onclick="exportCSV()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Exporter CSV
        </button>
        <button class="btn" onclick="fetchData()">Actualiser</button>
    </div>

    <div class="card">
        <table id="data-table">
            <thead>
                <tr>
                    <th>Centre</th>
                    <th>Nom & Prénom</th>
                    <th>Téléphone</th>
                    <th>Niveau</th>
                    <th>Classe</th>
                    <th>Établissement</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Data rows will be injected here -->
            </tbody>
        </table>
        <div id="loading">Chargement des données depuis Firestore...</div>
    </div>

    <footer>
        &copy; 2026 Étude Management System - Administration Dashboard
    </footer>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collectionGroup, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAN-Qd7kjXH-KaT4tnW5yYKg0lMhc1jokU",
        authDomain: "gestionetude-2bf18.firebaseapp.com",
        projectId: "gestionetude-2bf18",
        storageBucket: "gestionetude-2bf18.firebasestorage.app",
        messagingSenderId: "817901471261",
        appId: "1:817901471261:web:fe8b036427b5a62e2ae8f4",
        measurementId: "G-EWVX6N4K37"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allStudents = [];

    window.fetchData = async function() {
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-msg');
        const tbody = document.getElementById('table-body');
        
        loading.style.display = 'block';
        errorMsg.style.display = 'none';
        tbody.innerHTML = '';
        
        try {
            // Collection Group Query pour récupérer TOUS les élèves de TOUS les centres
            const studentsQuery = query(collectionGroup(db, 'students'));
            const querySnapshot = await getDocs(studentsQuery);
            
            allStudents = [];
            const centers = new Set();

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                // On récupère le SyncKey du document parent centers/{syncKey}/students/...
                const pathParts = doc.ref.path.split('/');
                const syncKey = pathParts[1];
                
                centers.add(syncKey);
                allStudents.push({
                    id: doc.id,
                    center: syncKey,
                    name: data.name || 'Inconnu',
                    phone: data.phone || '-',
                    email: data.email || '-',
                    level: data.level || '-',
                    grade: data.grade || '-',
                    school: data.originSchool || '-',
                });
            });

            renderTable(allStudents);
            document.getElementById('total-students').innerText = allStudents.length;
            document.getElementById('total-centers').innerText = centers.size;
            loading.style.display = 'none';

        } catch (e) {
            console.error("Error fetching data: ", e);
            loading.style.display = 'none';
            errorMsg.innerText = "Erreur: Impossible de récupérer les données. Vérifiez l'indexation Firestore (Collection Group Query). " + e.message;
            errorMsg.style.display = 'block';
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        data.forEach(s => {
            const row = `
                <tr>
                    <td><span class="badge">${s.center}</span></td>
                    <td style="font-weight: 600;">${s.name}</td>
                    <td>${s.phone}</td>
                    <td><span class="badge" style="background: rgba(245, 158, 11, 0.1); color: var(--accent);">${s.level}</span></td>
                    <td>${s.grade}</td>
                    <td style="color: var(--text-secondary); font-size: 0.85rem;">${s.school}</td>
                    <td>
                        <a href="tel:${s.phone}" style="color: var(--primary);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></a>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    window.filterTable = function() {
        const input = document.getElementById('search-input');
        const filter = input.value.toLowerCase();
        const filtered = allStudents.filter(s => 
            s.name.toLowerCase().includes(filter) || 
            s.phone.toLowerCase().includes(filter) || 
            s.school.toLowerCase().includes(filter) ||
            s.level.toLowerCase().includes(filter) ||
            s.grade.toLowerCase().includes(filter) ||
            s.center.toLowerCase().includes(filter)
        );
        renderTable(filtered);
    }

    window.exportCSV = function() {
        if (allStudents.length === 0) return alert("Aucune donnée à exporter");
        
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Center ID,Nom,Telephone,Niveau,Classe,Ecole\n";
        
        allStudents.forEach(s => {
            csvContent += `"${s.center}","${s.name}","${s.phone}","${s.level}","${s.grade}","${s.school}"\n`;
        });
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "collecte_etude_" + new Date().toISOString().split('T')[0] + ".csv");
        document.body.appendChild(link);
        link.click();
    }

    fetchData();
</script>

</body>
</html>
