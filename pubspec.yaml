name: etude_app
description: Application de gestion des séances d'étude
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^1.2.0
  intl: ^0.20.2
  uuid: ^4.2.2
  share_plus: any
  google_fonts: ^8.0.2
  path_provider: ^2.1.2
  local_auth: ^3.0.1
  device_info_plus: ^12.3.0
  crypto: ^3.0.3
  url_launcher: ^6.3.0
  pdf: ^3.11.1
  printing: ^5.13.1
  http: ^1.2.0
  package_info_plus: ^9.0.0
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/

msix_config:
  display_name: Étude
  publisher_display_name: RoyaAfricca
  identity_name: com.royaafricca.etude
  logo_path: windows\runner\resources\app_icon.ico
  desktop_shortcut: true
  start_menu_shortcut: true
  store: false
  output_path: E:\etude\website
  output_name: application_etude_windows
  languages: fr-fr
