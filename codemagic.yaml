workflows:
  ios-build:
    name: Build iOS IPA
    instance_type: mac_mini_m2
    environment:
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build iOS unsigned (to verify compilation)
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/**/*.app
